  <script>
    (function () {
      var viewerUrl = 'https://ordinals.com/content/33064f05445f5c4d97d6a70585e70cdabb0b52690e61d611afb2b4091aca614bi0';
      var iframe = document.getElementById('preview');
      var payload = document.getElementById('payload');
      var isReady = false;
      var sent = false;
      var retryTimer = 0;
      var retryCount = 0;

      function getPayloadHtml() {
        return payload.innerHTML.trim();
      }

      function postHtml() {
        if (!isReady || sent || !iframe.contentWindow) {
          return;
        }

        iframe.contentWindow.postMessage({
          type: 'html-view:render',
          html: getPayloadHtml()
        }, '*');

        sent = true;
      }

      function startRetries() {
        clearInterval(retryTimer);
        retryCount = 0;

        retryTimer = setInterval(function () {
          if (!iframe.contentWindow || sent) {
            clearInterval(retryTimer);
            return;
          }

          if (isReady) {
            postHtml();
          }

          retryCount += 1;

          if (retryCount > 20) {
            clearInterval(retryTimer);
          }
        }, 400);
      }

      window.addEventListener('message', function (event) {
        var data = event.data;
        if (!data || typeof data !== 'object') {
          return;
        }

        if (data.type === 'html-view-ready') {
          isReady = true;
          postHtml();
        }
      });

      iframe.addEventListener('load', function () {
        startRetries();
      });

      iframe.src = viewerUrl;
    }());
  </script>
